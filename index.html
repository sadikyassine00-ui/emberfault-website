    <title>Emberfault // High-Tension Destructible Voxel Swarm Action</title>
    <script>
      if (typeof window !== 'undefined') {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() { return originalFetch; },
            set(v) { 
              Object.defineProperty(window, 'fetch', {
                value: v,
                configurable: true,
                enumerable: true,
                writable: true
              });
            }
          });
        } catch (e) {
          console.warn("Could not polyfill window.fetch", e);
        }
      }
    </script>
